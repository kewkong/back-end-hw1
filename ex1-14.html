<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // ex1
      console.log("Hello World");

      // ex2
      console.log("Hello Kew");
      console.log("Hello Kew");

      // ex3
      console.log("Hello Kew");
      console.log("Hello Kew");
      console.log("Hello Kew");

      // ex4 แสดง console ผ่าน terminal ด้วย node.\app.js

      // ex5
      console.log(15);

      // ex6
      let weight = 70;
      let waterVolume = weight * 33;
      console.log("ปริมาณน้ำที่ควรดื่ม = " + waterVolume);

      // ex7
      console.log("Hello" + "World");
      console.log("Hello", "World");

      // ex8
      console.log("ปริมาณน้ำที่ควรดื่ม = " + waterVolume + " cc");

      // ex9
      console.log("ปริมาณน้ำที่ควรดื่ม = " + waterVolume / 1000 + " L");

      // ex10
      console.log(typeof "Hello");
      console.log(typeof 3500);
      console.log(typeof 3.1415);
      console.log(typeof "4/2");
      console.log(typeof 3 * 5);
      console.log(typeof 12);
      console.log(typeof -150);
      console.log(typeof 0);

      //   ex11
      var a = 10 + 5;

      // ex12
      var x = 10 + 5;
      var y = 10 + 5;
      var z = x + y;

      // ex13 เปลี่ยนชื่อตัวแปรให้ไม่ซ้ำ 12
      var p = 10 + 5;
      var q = 10 - 5;
      p = 12;
      console.log(p);
      // p มีค่า 12 เพราะมีการกำหนดค่าหลังประกาศตัวแปร และตัวแปรประกาศด้วย var สามารเปลี่ยนค่าได้

      //   ex14 ยืมตัวแปร x = 10+5 จาก ex12
      x = x + 1;
      console.log(x);
      // x มีค่า 16

    </script>
  </body>
</html>
